services:
  miner:
    #image: rdavidoff/twitch-channel-points-miner-v2
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      - TERM=xterm-256color
    volumes:
     # - './data/analytics:/usr/src/app/analytics'
     # - './data/cookies:/usr/src/app/cookies'
     # - './data/logs:/usr/src/app/logs'
     # - './settings.json:/usr/src/app/settings.json'
     # - './run.py:/usr/src/app/run.py:ro'
      - data/analytics:/usr/src/app/analytics
      - data/cookies:/usr/src/app/cookies
      - data/logs:/usr/src/app/logs
      - data/settings.json:/usr/src/app/settings.json
      - data/run.py:/usr/src/app/run.py:ro

    ports:
      - '5005:5005'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5005/health')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
volumes:
  data: